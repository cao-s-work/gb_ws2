collision_monitor:
  ros__parameters:
    use_sim_time: false
    enabled: true
    base_frame_id: "base_link"
    odom_frame_id: "camera_init"
    cmd_vel_in_topic: "/cmd_vel_nav"
    cmd_vel_out_topic: "/cmd_vel_collision"
    enable_stamped_cmd_vel: false
    state_topic: "/collision_monitor_state"
    transform_tolerance: 1.0
    source_timeout: 0.0
    base_shift_correction: false
    stop_pub_timeout: 0.5

    # ===== Polygon 区域定义 =====
    polygons: ["PolygonStop"]

    PolygonStop:
      type: "polygon"
      points: [0.95, 0.40, 0.95, -0.40, 0.55, -0.40, 0.55, 0.40]
      action_type: "stop"
      max_points: 2
      visualize: true
      polygon_pub_topic: "/polygon_stop"
      enabled: true

    # ===== 观察源 =====
    observation_sources: ["pointcloud"]

    pointcloud:
      type: "pointcloud"
      topic: "/points_nav"
      min_height: 0.05
      max_height: 1.20
      source_timeout: 0.0
      enabled: true
