# AMCL 定位参数 — ZSL-1W (MID-360 → scan → AMCL)
# 2026-07-07: 保守版 — 降低alpha防跳变，提高z_hit权重，禁随机恢复
amcl:
  ros__parameters:
    use_sim_time: false
    global_frame_id: "map"
    odom_frame_id: "camera_init"
    base_frame_id: "base_link"
    scan_topic: "/scan"
    tf_broadcast: true

    # 运动模型：中等保守，不过度扩散
    alpha1: 0.08
    alpha2: 0.08
    alpha3: 0.10
    alpha4: 0.10
    alpha5: 0.05

    # 激光模型：提高真实匹配权重，降低随机项
    laser_model_type: "likelihood_field"
    z_hit: 0.85
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.05
    sigma_hit: 0.12
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_min_range: 0.35
    laser_max_range: 8.0
    max_beams: 120

    # 粒子数适中
    min_particles: 800
    max_particles: 3000
    resample_interval: 1

    # 更新更频繁
    update_min_d: 0.03
    update_min_a: 0.03

    # 定位：手动重定位，不自动给(0,0,0)
    set_initial_pose: false

    # 禁止随机恢复粒子，避免全图乱跳
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0

    # 其他
    transform_tolerance: 0.3
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    pf_err: 0.01
    pf_z: 0.99
