# gb_perception / config / points_filter.yaml
#
# Parameters for PointsFilterNode
# FAST-LIO body-frame point cloud -> Nav2 filtered point cloud

points_filter:
  ros__parameters:
    # Topics
    input_topic: /cloud_body
    output_topic: /points_nav

    # Target frame for output PointCloud2
    target_frame: base_link

    # Height crop (relative to base_link: z up)
    z_min: 0.05
    z_max: 1.20

    # Radial range crop (from origin of source frame)
    range_min: 0.20
    range_max: 6.00

    # Voxel downsampling leaf size (meters, 0 = disable)
    voxel_leaf_size: 0.05

    # Remove NaN / Inf points
    remove_nan: true

    # Self-body cropping box (in base_link frame)
    crop_self: true
    self_box_x_min: -0.45
    self_box_x_max: 0.45
    self_box_y_min: -0.30
    self_box_y_max: 0.30
    self_box_z_min: -0.30
    self_box_z_max: 0.60

    # Restamp output pointcloud header.stamp to current ROS time
    # Fixes Livox hardware timestamp vs system clock offset
    restamp_output: true
    # Offset seconds: stamp = now - offset (accounts for TF pipeline delay)
    # Set to 0.0 for pure now restamp
    restamp_offset: 0.0

    # TF republisher: republish odom_lio→base_link with corrected timestamps
    # WARNING: Only enable ONE TF authority. When false, FAST-LIO is the sole publisher.
    # Set to true ONLY as temporary workaround for Livox hardware timestamp offset.
    tf_republish_enabled: false
