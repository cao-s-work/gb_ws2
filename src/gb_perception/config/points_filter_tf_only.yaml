# gb_perception / config / points_filter_tf_only.yaml
# Temporary: TF republisher only, publish to different topic
points_filter:
  ros__parameters:
    input_topic: /cloud_body
    output_topic: /points_nav_tf_only  # Changed to avoid competing with test
    target_frame: base_link
    z_min: 0.05
    z_max: 1.20
    range_min: 0.20
    range_max: 6.00
    voxel_leaf_size: 0.05
    remove_nan: true
    crop_self: true
    self_box_x_min: -0.45
    self_box_x_max: 0.45
    self_box_y_min: -0.30
    self_box_y_max: 0.30
    self_box_z_min: -0.30
    self_box_z_max: 0.60
    restamp_output: true
    restamp_offset: 0.7
